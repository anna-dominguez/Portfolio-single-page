services:
  portfolio:
    build: .
    restart: unless-stopped
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.portfolio.rule=Host(`anna-dominguez.com`) || Host(`www.anna-dominguez.com`)"
      - "traefik.http.routers.portfolio.entrypoints=websecure"
      - "traefik.http.routers.portfolio.tls.certresolver=letsencrypt"
      - "traefik.http.services.portfolio.loadbalancer.server.port=3000"
      - "traefik.http.middlewares.portfolio-www.redirectregex.regex=^https://www\\.anna-dominguez\\.com/(.*)"
      - "traefik.http.middlewares.portfolio-www.redirectregex.replacement=https://anna-dominguez.com/$${1}"
      - "traefik.http.routers.portfolio.middlewares=portfolio-www"

networks:
  proxy:
    external: true
